<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오늘 업무 입력</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap">
    <h1 style="font-size:1.4rem;margin-bottom:1.2rem;">오늘 업무 입력</h1>
    <form id="logForm">
      <label for="date">날짜</label>
      <input type="date" id="date" required>

      <label for="tasks">오늘 한 일</label>
      <textarea id="tasks" placeholder="오늘 한 일을 적어주세요" required></textarea>

      <label for="leave">추가 부재시간 (없으면 비워두세요)</label>
      <input type="text" id="leave" placeholder="예: 14:00-15:00 병원">

      <button type="submit" id="submitBtn">저장</button>
      <div class="msg" id="msg"></div>
    </form>
    <a class="back" href="/">← 돌아가기</a>
  </div>

<script>
  const dowNames = ["일", "월", "화", "수", "목", "금", "토"];
  const dateInput = document.getElementById("date");
  dateInput.value = new Date().toISOString().slice(0, 10);

  document.getElementById("logForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");
    msg.className = "msg";
    btn.disabled = true;
    btn.textContent = "저장 중...";

    const d = new Date(dateInput.value + "T00:00:00");
    const dow = dowNames[d.getDay()];
    const dateLabel = `${d.getMonth() + 1}/${d.getDate()}`;

    try {
      const res = await fetch("/api/submit-log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          date: dateLabel,
          dow,
          tasks: document.getElementById("tasks").value.trim(),
          leave: document.getElementById("leave").value.trim(),
        }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.className = "msg ok";
        msg.textContent = "저장됐습니다.";
        document.getElementById("tasks").value = "";
        document.getElementById("leave").value = "";
      } else {
        msg.className = "msg err";
        msg.textContent = "저장 실패: " + (data.error || "알 수 없는 오류");
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "저장 실패: " + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "저장";
    }
  });
</script>
</body>
</html>
