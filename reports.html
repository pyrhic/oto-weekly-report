<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주간보고서</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← 돌아가기</a>
    <h1 style="font-size:1.4rem;margin-bottom:1.2rem;">주간보고서</h1>
    <button id="genBtn" style="margin-bottom:20px;">이번 주 보고서 새로 만들기</button>
    <div class="msg" id="genMsg"></div>
    <div id="list"><div class="empty">불러오는 중...</div></div>
  </div>

<script>
  async function loadReports() {
    const list = document.getElementById("list");
    try {
      const res = await fetch("/api/reports");
      const rows = await res.json();

      if (!rows.length) {
        list.innerHTML = '<div class="empty">아직 저장된 주간보고서가 없습니다.</div>';
        return;
      }

      list.innerHTML = rows
        .map((row) => {
          const d = JSON.parse(row.report_data);
          const days = (d.days || [])
            .map(
              (day) =>
                `<div class="day"><span class="dow">${day.date}(${day.dow})</span>${(day.tasks || []).join(", ")}${
                  day.leave ? `<span class="leave">${day.leave}</span>` : ""
                }</div>`
            )
            .join("");
          return `<div class="report">
            <div class="period">${row.period_start} ~ ${row.period_end}</div>
            ${days}
          </div>`;
        })
        .join("");
    } catch (err) {
      list.innerHTML = '<div class="empty">불러오기 실패: ' + err.message + "</div>";
    }
  }

  document.getElementById("genBtn").addEventListener("click", async () => {
    const btn = document.getElementById("genBtn");
    const msg = document.getElementById("genMsg");
    btn.disabled = true;
    btn.textContent = "만드는 중...";
    msg.className = "msg";
    try {
      const res = await fetch("/api/generate-report", { method: "POST" });
      const data = await res.json();
      if (res.ok && data.success) {
        msg.className = "msg ok";
        msg.textContent = "보고서가 생성됐습니다.";
        loadReports();
      } else {
        msg.className = "msg err";
        msg.textContent = "실패: " + (data.error || "알 수 없는 오류");
      }
    } catch (err) {
      msg.className = "msg err";
      msg.textContent = "실패: " + err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "이번 주 보고서 새로 만들기";
    }
  });

  loadReports();
</script>
</body>
</html>
